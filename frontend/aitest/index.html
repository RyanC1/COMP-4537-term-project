<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Evaluate Demo</title>
    <link rel="stylesheet" href="./demo.css" />
</head>

<body>
    <main class="container">
        <section class="grid">
            <article class="panel">
                <h2>Request</h2>
                <label for="payload">JSON Body</label>
                <textarea id="payload" spellcheck="false">{
  "question": "What is polymorphism?",
  "referenceAnswer": "Polymorphism allows objects of different types to be treated through a common interface.",
  "studentAnswer": "Polymorphism means different objects can be used through the same parent type."
}</textarea>

                <div class="controls">
                    <button class="primary" id="sendButton" type="button">Send Request</button>
                    <button class="secondary" id="formatButton" type="button">Format JSON</button>
                </div>
                <p class="hint">Simple in-browser tester for your AI evaluate functionality.</p>
            </article>

            <article class="panel">
                <h2>Response</h2>
                <pre id="output">No request sent yet.</pre>
            </article>
        </section>
    </main>

    <script>
        const payloadInput = document.getElementById("payload");
        const output = document.getElementById("output");
        const sendButton = document.getElementById("sendButton");
        const formatButton = document.getElementById("formatButton");

        function writeOutput(value) {
            output.textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
        }

        // --- NEW: Function to get JWT Token ---
        async function getAuthToken() {
            try {
                const res = await fetch("https://comp-4537-term-project.onrender.com/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: "john@john.com",
                        password: "123"
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Login failed");
                return data.token;
            } catch (err) {
                writeOutput("Auth Error: " + err.message);
                return null;
            }
        }

        formatButton.addEventListener("click", () => {
            try {
                const parsed = JSON.parse(payloadInput.value);
                payloadInput.value = JSON.stringify(parsed, null, 2);
                writeOutput("JSON formatted successfully.");
            } catch (error) {
                writeOutput("Invalid JSON: " + error.message);
            }
        });

        sendButton.addEventListener("click", async () => {
            let body;
            try {
                body = JSON.parse(payloadInput.value);
            } catch (error) {
                writeOutput("Invalid JSON body: " + error.message);
                return;
            }

            writeOutput("Authenticating as john@john.com...");

            // 1. Get the token
            const token = await getAuthToken();
            if (!token) return;

            // 2. Prepare headers with Authorization
            const headers = {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}` // Critical for passing auth middleware
            };

            writeOutput("Auth successful. Sending AI Request...");

            try {
                const response = await fetch("https://comp-4537-term-project.onrender.com/api/ai/evaluate", {
                    method: "POST",
                    headers,
                    body: JSON.stringify(body)
                });

                const raw = await response.text();
                let parsed;
                try {
                    parsed = JSON.parse(raw);
                } catch {
                    parsed = raw;
                }

                const result = {
                    status: response.status,
                    statusText: response.statusText,
                    apiWarning: response.headers.get("X-API-Warning"),
                    data: parsed
                };

                writeOutput(result);
            } catch (error) {
                writeOutput("Request failed: " + error.message);
            }
        });
    </script>
</body>

</html>
